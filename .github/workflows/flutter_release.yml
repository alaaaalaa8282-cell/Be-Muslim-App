name: Flutter Android Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build Signed APK & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '2.10.5'
          channel: 'stable'
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Run tests
        run: flutter test || true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define=KEYSTORE_PATH=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.file=$PWD/android/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" != v* ]]; then
            VERSION="build-${{ github.run_number }}"
          fi
          cp build/app/outputs/flutter-apk/app-release.apk \
             be-muslim-app-${VERSION}.apk
          echo "APK_NAME=be-muslim-app-${VERSION}.apk" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Be Muslim App ${{ github.ref_name }}"
          body: |
            ## 🕌 Be Muslim App ${{ github.ref_name }}
            ### التحميل
            حمّل الـ APK من الملفات أدناه مباشرة.
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/keystore.jks
