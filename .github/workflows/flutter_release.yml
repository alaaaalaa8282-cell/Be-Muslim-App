name: Flutter Android Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build Signed APK & Release
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '2.10.5'
          channel: 'stable'
          cache: true

      # 4. Disable Flutter analytics (speeds up first run)
      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      # 5. Get dependencies
      - name: Install dependencies
        run: flutter pub get

      # 6. Analyze code (info/warnings don't fail the build)
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      # 7. Run tests
      - name: Run tests
        run: flutter test || true

      # 8. Decode keystore from Base64 secret
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      # 9. Create key.properties file for Android signing
      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      # 10. Build signed release APK
      - name: Build Signed Release APK
        run: flutter build apk --release

      # 11. Rename APK with version/run number
      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" != v* ]]; then
            VERSION="build-${{ github.run_number }}"
          fi
          cp build/app/outputs/flutter-apk/app-release.apk \
             be-muslim-app-${VERSION}.apk
          echo "APK_NAME=be-muslim-app-${VERSION}.apk" >> $GITHUB_ENV

      # 12. Upload APK as artifact (for every push to master)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
          retention-days: 14

      # 13. Create GitHub Release (only when pushing a tag like v1.0.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Be Muslim App ${{ github.ref_name }}"
          body: |
            ## 🕌 Be Muslim App ${{ github.ref_name }}

            ### ما الجديد؟
            - تحديث تلقائي عبر GitHub Actions

            ### التحميل
            حمّل الـ APK من الملفات أدناه مباشرة.
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 14. Clean up keystore (security)
      - name: Clean up keystore
        if: always()
        run: rm -f android/app/keystore.jks android/key.properties
