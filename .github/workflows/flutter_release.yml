name: Flutter Android Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build Signed APK & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '2.10.5'
          channel: 'stable'
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Run tests
        run: flutter test || true

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/keystore.jks \
            -alias bemuslim \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass bemuslim123 \
            -keypass bemuslim123 \
            -dname "CN=BeMulsim, O=BeMuslim, C=EG"

      - name: Build Signed Release APK
        run: |
          ./android/gradlew assembleRelease \
            -p android \
            -Pandroid.injected.signing.store.file=$PWD/android/app/keystore.jks \
            -Pandroid.injected.signing.store.password=bemuslim123 \
            -Pandroid.injected.signing.key.alias=bemuslim \
            -Pandroid.injected.signing.key.password=bemuslim123 \
            --no-daemon

      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" != v* ]]; then
            VERSION="build-${{ github.run_number }}"
          fi
          cp android/app/build/outputs/apk/release/app-release.apk \
             be-muslim-app-${VERSION}.apk
          echo "APK_NAME=be-muslim-app-${VERSION}.apk" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Be Muslim App ${{ github.ref_name }}"
          body: |
            ## 🕌 Be Muslim App ${{ github.ref_name }}
            ### التحميل
            حمّل الـ APK من الملفات أدناه مباشرة.
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/keystore.jks
