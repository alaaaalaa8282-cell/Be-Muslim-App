name: Flutter Android Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '2.10.5'
          channel: 'stable'
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Run tests
        run: flutter test || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/keystore.jks \
            -alias bemuslim \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass bemuslim123 \
            -keypass bemuslim123 \
            -dname "CN=BeMuslim, O=BeMuslim, C=EG"

      - name: Build Signed Release APK
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/keystore.jks \
            -Pandroid.injected.signing.store.password=bemuslim123 \
            -Pandroid.injected.signing.key.alias=bemuslim \
            -Pandroid.injected.signing.key.password=bemuslim123 \
            --no-daemon

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Be Muslim App - إصدار ${{ github.run_number }}"
          body: |
            ## 🕌 Be Muslim App - إصدار ${{ github.run_number }}
            ### التحميل
            حمّل الـ APK من الملفات أدناه مباشرة.
          files: android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/keystore.jks
